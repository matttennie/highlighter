<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
      color: #1a1a1a;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #666;
      margin-bottom: 4px;
    }
    input[type="password"],
    input[type="text"],
    select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    .hint {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }
    .toggle-row label {
      margin-bottom: 0;
      font-size: 13px;
      color: #1a1a1a;
    }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      transition: 0.2s;
    }
    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .slider {
      background: #7c5cbf;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(18px);
    }
    .status {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
    }
    .debug-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .debug-actions button {
      flex: 1;
      border: 1px solid #d0c8e8;
      border-radius: 4px;
      background: #fff;
      color: #5b4a8a;
      cursor: pointer;
      font: inherit;
      font-size: 11px;
      padding: 5px 6px;
    }
    .debug-actions button:hover {
      background: #f5f3ff;
    }
    .debug-preview {
      display: none;
      margin-top: 8px;
      max-height: 120px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid #eee;
      border-radius: 4px;
      background: #fafafa;
      color: #555;
      font: 10px/1.35 ui-monospace, SFMono-Regular, Menlo, monospace;
      padding: 6px;
    }
    .shortcut {
      margin-top: 12px;
      padding: 8px;
      background: #f5f3ff;
      border-radius: 4px;
      font-size: 12px;
      color: #5b4a8a;
    }
    kbd {
      display: inline-block;
      padding: 1px 5px;
      font-size: 11px;
      font-family: inherit;
      background: white;
      border: 1px solid #d0c8e8;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <h1>Highlighter TTS (Inworld)</h1>

  <div class="field">
    <label for="inworldApiToken">Inworld API Key</label>
    <input type="password" id="inworldApiToken" placeholder="Enter Inworld key...">
    <div class="hint">Your Inworld key for affordable, high-quality TTS.</div>
  </div>

  <div class="field">
    <label for="modelId">TTS Model</label>
    <select id="modelId">
      <option value="inworld-tts-1.5-max">Max (High Quality)</option>
      <option value="inworld-tts-1.5-mini">Mini (Fast & Efficient)</option>
    </select>
    <div class="hint" id="modelHint">Model options for Inworld AI.</div>
  </div>

  <div class="field">
    <label for="defaultVoice">Default Voice</label>
    <select id="defaultVoice"></select>
    <div class="hint" id="voiceHint">Dropdown shows voices returned by the Inworld API.</div>
  </div>

  <div class="field">
    <label for="defaultSpeed">Default Speed</label>
    <select id="defaultSpeed">
      <option value="0.7">0.7x</option>
      <option value="0.75">0.75x</option>
      <option value="0.9">0.9x</option>
      <option value="1" selected>1.0x</option>
      <option value="1.1">1.1x</option>
      <option value="1.2">1.2x</option>
    </select>
  </div>

  <div class="toggle-row">
    <label for="articleMode">Article Mode (filter ads/nav)</label>
    <div class="toggle">
      <input type="checkbox" id="articleMode" checked>
      <span class="slider"></span>
    </div>
  </div>

  <div class="status" id="status"></div>

  <div class="debug-actions">
    <button type="button" id="copyDebugLog">Copy Debug Log</button>
    <button type="button" id="clearDebugLog">Clear Log</button>
  </div>
  <pre class="debug-preview" id="debugPreview"></pre>

  <div class="shortcut">
    Activate: right-click &rarr; "Toggle Highlight Mode"
  </div>

  <script src="popup.js"></script>
</body>
</html>
